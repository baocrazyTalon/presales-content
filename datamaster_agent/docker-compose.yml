services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: presales_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-presales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-presales_secret}
      POSTGRES_DB: ${POSTGRES_DB:-presales_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-presales} -d ${POSTGRES_DB:-presales_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
